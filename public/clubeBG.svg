<svg class="svg-banner absolute inset-0" viewBox="0 0 1200 280" preserveAspectRatio="xMidYMid slice"
    xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradiente de Fundo -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" /> <!-- Slate 900 -->
            <stop offset="50%" stop-color="#164e63" /> <!-- Cyan 900 -->
            <stop offset="100%" stop-color="#083344" /> <!-- Cyan 950 -->
        </linearGradient>

        <!-- Padrão de Grade (Matemática/Exatas) -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
        </pattern>

        <!-- Gradiente dos Ícones -->
        <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.8" /> <!-- Cyan 400 -->
            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.2" /> <!-- Blue 500 -->
        </linearGradient>

        <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fb923c" stop-opacity="0.6" /> <!-- Orange 400 -->
            <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.1" /> <!-- Rose 500 -->
        </linearGradient>
    </defs>

    <!-- Fundo base -->
    <rect width="100%" height="100%" fill="url(#bg-grad)" />
    <!-- Grade -->
    <rect width="100%" height="100%" fill="url(#grid)" />

    <!-- Elementos Abstratos Brilhantes -->
    <circle cx="150" cy="50" r="150" fill="rgba(6, 182, 212, 0.15)" filter="blur(40px)" />
    <circle cx="1050" cy="200" r="200" fill="rgba(14, 165, 233, 0.1)" filter="blur(50px)" />
    <circle cx="600" cy="140" r="100" fill="rgba(249, 115, 22, 0.05)" filter="blur(40px)" />

    <!-- GRUPO ESQUERDA: DNA e Biologia -->
    <g transform="translate(80, 40)" stroke="url(#icon-grad)" stroke-width="2" fill="none">
        <!-- Fita de DNA estilizada -->
        <path d="M 0,20 C 30,20 40,80 70,80 C 100,80 110,20 140,20" opacity="0.6" />
        <path d="M 0,80 C 30,80 40,20 70,20 C 100,20 110,80 140,80" opacity="0.6" />
        <!-- Ligações -->
        <line x1="15" y1="35" x2="15" y2="65" opacity="0.4" />
        <line x1="35" y1="48" x2="35" y2="52" opacity="0.4" />
        <line x1="105" y1="48" x2="105" y2="52" opacity="0.4" />
        <line x1="125" y1="35" x2="125" y2="65" opacity="0.4" />
        <line x1="55" y1="40" x2="55" y2="60" opacity="0.4" />
        <line x1="85" y1="40" x2="85" y2="60" opacity="0.4" />
        <line x1="70" y1="20" x2="70" y2="80" opacity="0.4" />

        <!-- Folha (Representando o Campo/Agrárias) -->
        <path d="M 30,130 C 30,90 80,90 80,130 C 80,170 30,170 30,130 Z"
            fill="rgba(34, 211, 238, 0.05)" opacity="0.7" />
        <path d="M 30,130 C 30,150 55,165 80,130" opacity="0.5" />
    </g>

    <!-- GRUPO CENTRO: Rede de Conexões (Tecnologia/Clube) -->
    <g transform="translate(450, 60)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5">
        <line x1="50" y1="120" x2="120" y2="40" />
        <line x1="120" y1="40" x2="220" y2="70" />
        <line x1="220" y1="70" x2="280" y2="140" />
        <line x1="280" y1="140" x2="180" y2="160" />
        <line x1="180" y1="160" x2="50" y2="120" />
        <line x1="120" y1="40" x2="180" y2="160" opacity="0.5" />
        <line x1="220" y1="70" x2="50" y2="120" opacity="0.5" />

        <!-- Nós (Nodes) -->
        <circle cx="50" cy="120" r="4" fill="#22d3ee" stroke="none" />
        <circle cx="120" cy="40" r="5" fill="#38bdf8" stroke="none" />
        <circle cx="220" cy="70" r="6" fill="#818cf8" stroke="none" />
        <circle cx="280" cy="140" r="4" fill="#fb923c" stroke="none" />
        <circle cx="180" cy="160" r="5" fill="#2dd4bf" stroke="none" />

        <!-- Aura nos nós -->
        <circle cx="120" cy="40" r="12" fill="rgba(56, 189, 248, 0.2)" stroke="none" />
        <circle cx="220" cy="70" r="15" fill="rgba(129, 140, 248, 0.2)" stroke="none" />
    </g>

    <!-- GRUPO DIREITA: Átomo e Química -->
    <g transform="translate(950, 100)">
        <!-- Tubo de Erlenmeyer -->
        <g transform="translate(-150, 20)" stroke="url(#accent-grad)" stroke-width="2" fill="none"
            opacity="0.7">
            <path
                d="M 20,0 L 40,0 L 40,30 L 60,80 A 10,10 0 0,1 50,95 L 10,95 A 10,10 0 0,1 0,80 L 20,30 Z" />
            <path d="M 8,80 L 52,80" opacity="0.5" />
            <path d="M 12,65 L 48,65" opacity="0.3" />
            <circle cx="25" cy="88" r="2" fill="#fb923c" stroke="none" />
            <circle cx="35" cy="75" r="1.5" fill="#fb923c" stroke="none" />
            <circle cx="28" cy="68" r="2.5" fill="#fb923c" stroke="none" />
            <circle cx="30" cy="45" r="1.5" fill="#fb923c" stroke="none" opacity="0.6" />
        </g>

        <!-- Átomo -->
        <g stroke="url(#icon-grad)" stroke-width="1.5" fill="none" opacity="0.8">
            <ellipse cx="60" cy="60" rx="60" ry="20" transform="rotate(30 60 60)" />
            <ellipse cx="60" cy="60" rx="60" ry="20" transform="rotate(90 60 60)" />
            <ellipse cx="60" cy="60" rx="60" ry="20" transform="rotate(150 60 60)" />
            <!-- Núcleo -->
            <circle cx="60" cy="60" r="8" fill="#22d3ee" stroke="none" filter="blur(1px)" />
            <circle cx="60" cy="60" r="4" fill="#ffffff" stroke="none" />

            <!-- Elétrons -->
            <circle cx="118" cy="78" r="3" fill="#38bdf8" stroke="none" />
            <circle cx="60" cy="118" r="3" fill="#38bdf8" stroke="none" />
            <circle cx="2" cy="42" r="3" fill="#38bdf8" stroke="none" />
        </g>
    </g>

    <!-- Partículas flutuantes aleatórias -->
    <g fill="#ffffff" stroke="none">
        <circle cx="10%" cy="80%" r="1.5" opacity="0.3" />
        <circle cx="20%" cy="20%" r="2" opacity="0.2" />
        <circle cx="40%" cy="70%" r="1" opacity="0.4" />
        <circle cx="70%" cy="30%" r="2" opacity="0.3" />
        <circle cx="85%" cy="85%" r="1.5" opacity="0.2" />
        <circle cx="95%" cy="40%" r="1" opacity="0.5" />
    </g>

    <!-- Curva suave no fundo -->
    <path d="M0,280 L0,230 C 300,300 800,100 1200,240 L1200,280 Z" fill="rgba(255,255,255,0.03)"
        stroke="none" />
</svg>