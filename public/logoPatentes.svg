<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%" class="logo-svg">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Montserrat:wght@700;800&amp;display=swap');
            
            /* ESTILOS DE TEXTO */
            .title-text { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 68px; letter-spacing: -1.5px; }
            .title-blue { fill: #0F172A; }
            .title-orange { fill: #EA580C; }
            .subtitle-text { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 22px; fill: #475569; letter-spacing: 0.5px; }
            .subtitle-bold { font-weight: 700; fill: #1E293B; }

            /* ANIMAÇÕES CSS */
            .logo-svg {
                animation: fadeIn 1.5s ease-out forwards;
            }

            .wave-back {
                animation: waveBob 3s infinite ease-in-out alternate;
                transform-origin: center;
            }
            .wave-front {
                animation: waveBob 2.5s infinite ease-in-out alternate-reverse;
                transform-origin: center;
            }

            .bubble {
                animation: bubbleRise infinite linear;
                transform-origin: center;
            }
            .b1 { animation-duration: 2s; animation-delay: 0s; }
            .b2 { animation-duration: 2.5s; animation-delay: 0.5s; }
            .b3 { animation-duration: 1.8s; animation-delay: 1s; }
            .b4 { animation-duration: 2.2s; animation-delay: 0.2s; }
            .b5 { animation-duration: 2.6s; animation-delay: 0.8s; }
            .b6 { animation-duration: 1.9s; animation-delay: 1.2s; }

            .spark {
                animation: sparkPulse 2s infinite ease-in-out;
                transform-origin: 200px 25px;
            }

            .particle {
                animation: particleFloat 3s infinite ease-in-out alternate;
            }
            .p1 { animation-delay: 0s; }
            .p2 { animation-delay: 0.5s; }
            .p3 { animation-delay: 1s; }

            .text-title {
                opacity: 0;
                animation: slideLeft 1s ease-out 0.5s forwards;
            }
            .text-sub1 {
                opacity: 0;
                animation: slideLeft 1s ease-out 0.7s forwards;
            }
            .text-sub2 {
                opacity: 0;
                animation: slideLeft 1s ease-out 0.9s forwards;
            }

            /* KEYFRAMES */
            @keyframes fadeIn {
                from { opacity: 0; transform: scale(0.95); }
                to { opacity: 1; transform: scale(1); }
            }

            @keyframes waveBob {
                0% { transform: translateY(0) rotate(0deg) scaleY(1); }
                100% { transform: translateY(-4px) rotate(1deg) scaleY(1.05); }
            }

            @keyframes bubbleRise {
                0% { transform: translateY(10px); opacity: 0; }
                20% { opacity: 1; }
                80% { opacity: 1; }
                100% { transform: translateY(-30px); opacity: 0; }
            }

            @keyframes sparkPulse {
                0%, 100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 5px rgba(245, 158, 11, 0.5)); }
                50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.9)); }
            }

            @keyframes particleFloat {
                0% { transform: translateY(0px) translateX(0px); }
                100% { transform: translateY(-8px) translateX(4px); opacity: 0.4; }
            }

            @keyframes slideLeft {
                from { opacity: 0; transform: translateX(20px); }
                to { opacity: 1; transform: translateX(0); }
            }
        </style>
        
        <linearGradient id="orangeLiquid" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FBBF24" />
            <stop offset="100%" stop-color="#EA580C" />
        </linearGradient>
        <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FEF08A" />
            <stop offset="100%" stop-color="#F59E0B" />
        </linearGradient>
        
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.25" />
        </filter>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        
        <path id="flaskShape" d="M 180 80 L 220 80 L 220 115 L 265 185 A 15 15 0 0 1 252 210 L 148 210 A 15 15 0 0 1 135 185 L 180 115 Z" />
        <rect id="flaskLip" x="170" y="70" width="60" height="12" rx="6" />
        <clipPath id="flaskClip">
            <use href="#flaskShape" />
            <use href="#flaskLip" />
        </clipPath>
        <mask id="flaskMask">
            <rect x="0" y="0" width="1000" height="320" fill="white" />
            <use href="#flaskShape" fill="black" />
            <use href="#flaskLip" fill="black" />
        </mask>
    </defs>

    <g clip-path="url(#flaskClip)">
        <path class="wave-back" d="M 120 160 C 145 180, 175 140, 200 160 C 225 180, 255 140, 280 160 L 280 220 L 120 220 Z" fill="#C2410C" opacity="0.6" />
        <path class="wave-front" d="M 120 170 C 145 150, 175 190, 200 170 C 225 150, 255 190, 280 170 L 280 220 L 120 220 Z" fill="url(#orangeLiquid)" />
        
        <circle class="bubble b1" cx="170" cy="180" r="6" fill="#FFFFFF" opacity="0.9" />
        <circle class="bubble b2" cx="195" cy="190" r="4.5" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.9" />
        <circle class="bubble b3" cx="215" cy="165" r="7" fill="#FFFFFF" opacity="0.9" />
        <circle class="bubble b4" cx="235" cy="180" r="3" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8" />
        <circle class="bubble b5" cx="185" cy="145" r="3" fill="#FFFFFF" opacity="0.8" />
        <circle class="bubble b6" cx="225" cy="135" r="5" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8" />
    </g>

    <g filter="url(#dropShadow)">
        <g mask="url(#flaskMask)">
            <path d="M 100 40 A 30 30 0 0 0 70 70 L 70 250 A 30 30 0 0 0 130 250 L 130 240 L 180 240 A 100 100 0 0 0 280 140 A 100 100 0 0 0 180 40 Z" fill="#1E3A8A" />
        </g>
    </g>

    <path d="M 150 190 L 180 125" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5" fill="none" />
    <path d="M 215 85 L 215 105" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5" fill="none" />
    <path d="M 178 76 L 198 76" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.7" fill="none" />

    <path class="spark" d="M 200 5 Q 200 25 220 25 Q 200 25 200 45 Q 200 25 180 25 Q 200 25 200 5 Z" fill="url(#sparkGrad)" filter="url(#glow)" />
    
    <circle class="particle p1" cx="180" cy="50" r="2.5" fill="#FBBF24" opacity="0.8" />
    <circle class="particle p2" cx="220" cy="55" r="1.5" fill="#FBBF24" opacity="0.6" />
    <circle class="particle p3" cx="230" cy="35" r="2" fill="#FBBF24" opacity="0.9" />

    <line x1="320" y1="60" x2="320" y2="260" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round" />

    <g transform="translate(355, 0)">
        <text x="0" y="145" class="title-text text-title">
            <tspan class="title-blue">Patentes</tspan><tspan class="title-orange">Lab</tspan>
        </text>
        <text x="5" y="195" class="subtitle-text text-sub1">
            Assistente de <tspan class="subtitle-bold">Solicitações de Patentes</tspan>
        </text>
        <text x="5" y="230" class="subtitle-text text-sub2">
            para os <tspan class="subtitle-bold">Clubes de Ciências</tspan>
        </text>
    </g>
</svg>