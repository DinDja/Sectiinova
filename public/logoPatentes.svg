<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
    <defs>
        <!-- Importação de Fontes do Google e Estilos de Texto -->
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Montserrat:wght@700;800&amp;display=swap');
            
            .title-text {
                font-family: 'Montserrat', sans-serif;
                font-weight: 800;
                font-size: 68px;
                letter-spacing: -1.5px;
            }
            .title-blue { fill: #0F172A; }
            .title-orange { fill: #EA580C; }

            .subtitle-text {
                font-family: 'Inter', sans-serif;
                font-weight: 500;
                font-size: 22px;
                fill: #475569;
                letter-spacing: 0.5px;
            }
            .subtitle-bold {
                font-weight: 700;
                fill: #1E293B;
            }
        </style>

        <!-- Gradientes Profissionais -->
        <linearGradient id="orangeLiquid" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FBBF24" /> <!-- Amarelo Dourado -->
            <stop offset="100%" stop-color="#EA580C" /> <!-- Laranja Laboratório -->
        </linearGradient>

        <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FEF08A" />
            <stop offset="100%" stop-color="#F59E0B" />
        </linearGradient>

        <!-- Filtros e Efeitos -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.25" />
        </filter>

        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Geometria do Frasco centralizada no loop do 'P' (Usado para Máscara e Clip) -->
        <path id="flaskShape" d="M 180 80 L 220 80 L 220 115 L 265 185 A 15 15 0 0 1 252 210 L 148 210 A 15 15 0 0 1 135 185 L 180 115 Z" />
        <rect id="flaskLip" x="170" y="70" width="60" height="12" rx="6" />

        <clipPath id="flaskClip">
            <use href="#flaskShape" />
            <use href="#flaskLip" />
        </clipPath>

        <mask id="flaskMask">
            <!-- Branco é sólido (o 'P' aparece), Preto é transparente (cria o buraco do frasco) -->
            <rect x="0" y="0" width="1000" height="320" fill="white" />
            <use href="#flaskShape" fill="black" />
            <use href="#flaskLip" fill="black" />
        </mask>
    </defs>

    <title>Logo PatentesLab - Design Clean e Espaço Negativo</title>

    <!-- ========================================== -->
    <!-- ÍCONE PRINCIPAL: O "P" COM ESPAÇO NEGATIVO -->
    <!-- ========================================== -->
    
    <!-- 1. O Líquido do Laboratório (Atrás do P, visível apenas pelo buraco) -->
    <g clip-path="url(#flaskClip)">
        <!-- Camada de fundo do líquido (onda escura) -->
        <path d="M 120 160 C 145 180, 175 140, 200 160 C 225 180, 255 140, 280 160 L 280 220 L 120 220 Z" fill="#C2410C" opacity="0.6" />
        
        <!-- Camada frontal do líquido (onda brilhante) -->
        <path d="M 120 170 C 145 150, 175 190, 200 170 C 225 150, 255 190, 280 170 L 280 220 L 120 220 Z" fill="url(#orangeLiquid)" />
        
        <!-- Bolhas borbulhando -->
        <circle cx="170" cy="180" r="6" fill="#FFFFFF" opacity="0.9" />
        <circle cx="195" cy="190" r="4.5" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.9" />
        <circle cx="215" cy="165" r="7" fill="#FFFFFF" opacity="0.9" />
        <circle cx="235" cy="180" r="3" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8" />
        <circle cx="185" cy="145" r="3" fill="#FFFFFF" opacity="0.8" />
        <circle cx="225" cy="135" r="5" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8" />
    </g>

    <!-- 2. O Corpo da Letra "P" (Com o buraco do frasco e sombra projetada) -->
    <g filter="url(#dropShadow)">
        <g mask="url(#flaskMask)">
            <!-- Corpo unificado do P: Haste e Curva integrados em uma única forma de cor sólida para tom perfeitamente uniforme -->
            <path d="M 100 40 
                     A 30 30 0 0 0 70 70 
                     L 70 250 
                     A 30 30 0 0 0 130 250 
                     L 130 240 
                     L 180 240 
                     A 100 100 0 0 0 280 140 
                     A 100 100 0 0 0 180 40 
                     Z" fill="#1E3A8A" />
        </g>
    </g>

    <!-- 3. Detalhes em Vidro (Reflexos do frasco sobre o vazio) -->
    <!-- Esses traços brancos dão volume 3D ao vidro recortado no P -->
    <path d="M 150 190 L 180 125" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5" fill="none" />
    <path d="M 215 85 L 215 105" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5" fill="none" />
    <path d="M 178 76 L 198 76" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.7" fill="none" />

    <!-- 4. A Centelha de Inovação (Estrela emergindo do topo do frasco) -->
    <path d="M 200 5 Q 200 25 220 25 Q 200 25 200 45 Q 200 25 180 25 Q 200 25 200 5 Z" fill="url(#sparkGrad)" filter="url(#glow)" />
    
    <!-- Pequenas partículas flutuando ao redor -->
    <circle cx="180" cy="50" r="2.5" fill="#FBBF24" opacity="0.8" />
    <circle cx="220" cy="55" r="1.5" fill="#FBBF24" opacity="0.6" />
    <circle cx="230" cy="35" r="2" fill="#FBBF24" opacity="0.9" />

    <!-- ========================================== -->
    <!-- LINHA DIVISÓRIA                            -->
    <!-- ========================================== -->
    <!-- Afastada levemente para dar respiro ao design do P -->
    <line x1="320" y1="60" x2="320" y2="260" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round" />

    <!-- ========================================== -->
    <!-- TEXTO E TIPOGRAFIA                         -->
    <!-- ========================================== -->
    <g transform="translate(355, 0)">
        <!-- Título Principal -->
        <text x="0" y="145" class="title-text">
            <tspan class="title-blue">Patentes</tspan><tspan class="title-orange">Lab</tspan>
        </text>

        <!-- Subtítulo -->
        <text x="5" y="195" class="subtitle-text">
            Assistente de <tspan class="subtitle-bold">Solicitações de Patentes</tspan>
        </text>
        <text x="5" y="230" class="subtitle-text">
            para os <tspan class="subtitle-bold">Clubes de Ciências</tspan>
        </text>
    </g>

</svg>