[build]
  command = "node scripts/netlify-runtime-preflight.mjs && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"

[functions."inpi-watch"]
  schedule = "*/30 * * * *"

[functions."pop-eventos-alerts"]
  schedule = "0 * * * *"
