[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/inpi/process"
  to = "/.netlify/functions/inpi-process"
  status = 200

[[redirects]]
  from = "/api/inpi/watch"
  to = "/.netlify/functions/inpi-watch-run"
  status = 200
