	var booMunicipioCarregado=false;
	
	function carregaMunicipioDirec(){
	/*
	@desc	Rotina que chama o proxyLet para carregar os municipios
	referente a direc selecionada
	@autor	Juracy Araujo - jjunior@sec.ba.gov.br
	@versăo	1.0
	@param	
	@rel	
	@pre	Selecionar uma direc	
	@pos	Carregar os municipios
	@ret	
	@hist
	*/		
	
		var strUrl="proxyLet.asp?tipoAcao=carregaMunicipiosDirec";
		strUrl=strUrl + "&coddirec=" + $('#direc :selected').val();
		//window.open(strUrl);
		preencheCombo(strUrl,document.all.municipio);
		//## Se nao escolher a DIREC entao se selecionar o municipio, vai entao selecionar a DIREC
		if( $('#direc :selected').val()==""){
			booMunicipioCarregado=false;
		}else{
		//## Entra aqui entao alguma direc foi selecionada
			booMunicipioCarregado=true;		
		}

		$('#municipio :selected').text="";
	}
	
	function carregaDirecMunicipio(){
	/*
	@desc	Rotina que chama o proxyLet para retornar a DIREC
	referente ao municipio selecionado
	@autor	Juracy Araujo - jjunior@sec.ba.gov.br
	@versăo	1.0
	@param	
	@rel

	@pos	Seleciona a DIREC
	@ret

			strUrl=strUrl + "&codMunicipio=" +  $('#municipio :selected').val();

		//alert(parseInt(intCont))
		//arrayIDs[key].id_produto_itens
		//alert(document.all.direc[intCont].value)
		
		while(parseInt(intCont)<parseInt(document.all.direc.length)){

				document.all.direc[intCont].selected=true;

			}
			intCont=intCont+1;
		}
	}	

	function trim(inputString) {
	/*
	@desc	Funçăo que retira os espacos a mais etre os caracteres
	@autor	Juracy Araujo - jjunior@sec.ba.gov.br
	@versăo	1.0
	@param	inputString: Valor a ser corrigido
	@rel	
	@pre	Informar qual campo será dado o trim..
	@pos	Retira os espacos a mais
	@ret	Năo tem retorno
	@hist
	*/
		// Removes leading and trailing spaces from the passed string. Also removes
		// consecutive spaces and replaces it with one space. If something besides
		// a string is passed in (null, custom object, etc.) then return the input.
		if (typeof inputString != "string") { return inputString; }
		var retValue = inputString;
		var ch = retValue.substring(0, 1);
		while (ch == " ") { // Check for spaces at the beginning of the string
			retValue = retValue.substring(1, retValue.length);
			ch = retValue.substring(0, 1);
		}
		
		ch = retValue.substring(retValue.length-1, retValue.length);
		while (ch == " ") { // Check for spaces at the end of the string
			retValue = retValue.substring(0, retValue.length-1);
			ch = retValue.substring(retValue.length-1, retValue.length);
		}
		
		while (retValue.indexOf("  ") != -1) { // Note that there are two spaces in the string - look for multiple spaces within the string
			retValue = retValue.substring(0, retValue.indexOf("  ")) + retValue.substring(retValue.indexOf("  ")+1, retValue.length); // Again, there are two spaces in each of the strings
		}
		return retValue; // Return the trimmed string back to the user
	} // Ends the "trim" function

	function MudaUnidadeRegional() {
		var eOnChangeMunicipio;
		var eOnChangeUnidadeRegional;
		var strDirec;
		var i;

		// Desativa o evento OnChange dos MUNICÍPIOS
		eOnChangeMunicipio = frm.municipio.onchange;
		eOnChangeUnidadeRegional = frm.direc.onchange;
		frm.municipio.onchange = "";
		frm.direc.onchange = "";

		
		// Seleciona a DIREC de acordo com o município
		i=0;
		while( i < frm.direc.length) {
			strDirec = frm.direc.options[i].value.split(";");
			if( trim( strDirec) != "") {
				if( strDirec[1].substring(0, 7) == frm.municipio(frm.municipio.selectedIndex).value.substring(0,7))
					break;
			}
			i = i + 1;
		}

		// Seleciona o município
		frm.direc.selectedIndex = i ;


		// Ativa o evento OnChange dos SELECTs
		frm.municipio.onchange = eOnChangeMunicipio;
		frm.direc.onchange = eOnChangeUnidadeRegional;
	}
	function MudaMunicipio() {
		var eOnChangeMunicipio;
		var eOnChangeUnidadeRegional;
		var strMunicipio;
		var i;

		// Desativa o evento OnChange dos MUNICÍPIOS
		eOnChangeMunicipio = frm.municipio.onchange;
		eOnChangeUnidadeRegional = frm.direc.onchange;
		frm.municipio.onchange = "";
		frm.direc.onchange = "";

		// Separa as strings
		strMunicipio = frm.direc(frm.direc.selectedIndex).value.split(";");

		i=0;
		// Seleciona a DIREC de acordo com o município
		while(( i < frm.municipio.length) && (frm.municipio.options[i].value != strMunicipio[1]) ) {
			i = i + 1;
		}

		// Seleciona o município
		frm.municipio.selectedIndex = i ;

		// Ativa o evento OnChange dos SELECTs
		frm.municipio.onchange = eOnChangeMunicipio;
		frm.direc.onchange = eOnChangeUnidadeRegional;
	}
